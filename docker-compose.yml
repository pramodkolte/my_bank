services:
  # --- Spring Cloud Infrastructure ---
  discovery-server:
    image: ${DOCKER_HUB_USER}/discovery-server:latest
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=80.0
    deploy:
      resources:
        limits:
          memory: 300M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: banking-app-logs
        awslogs-stream: discovery-server
        awslogs-create-group: "true"

  config-server:
    image: ${DOCKER_HUB_USER}/config-server:latest
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=80.0
    deploy:
      resources:
        limits:
          memory: 300M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9191/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      discovery-server:
        condition: service_healthy
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: banking-app-logs
        awslogs-stream: config-server
        awslogs-create-group: "true"

  api-gateway:
    image: ${DOCKER_HUB_USER}/api-gateway:latest
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=80.0
    deploy:
      resources:
        limits:
          memory: 400M
    ports:
      - "80:8080"
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: banking-app-logs
        awslogs-stream: api-gateway
        awslogs-create-group: "true"

  # --- Business Logic Services ---
  identity-service:
    image: ${DOCKER_HUB_USER}/identity-service:latest
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:9191
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - RDS_DB_HOST=${RDS_DB_HOST}
      - RDS_DB_PASSWORD=${RDS_DB_PASSWORD}
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=80.0
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: banking-app-logs
        awslogs-stream: identity-service
        awslogs-create-group: "true"

  account-service:
    image: ${DOCKER_HUB_USER}/account-service:latest
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:9191
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - RDS_DB_HOST=${RDS_DB_HOST}
      - RDS_DB_PASSWORD=${RDS_DB_PASSWORD}
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=80.0
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: banking-app-logs
        awslogs-stream: account-service
        awslogs-create-group: "true"

  notification-service:
    image: ${DOCKER_HUB_USER}/notification-service:latest
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:9191
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=80.0
    deploy:
      resources:
        limits:
          memory: 400M
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: banking-app-logs
        awslogs-stream: notification-service
        awslogs-create-group: "true"

  audit-service:
    image: ${DOCKER_HUB_USER}/audit-service:latest
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:9191
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - MONGO_DB_PASSWORD=${MONGO_DB_PASSWORD}
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=80.0
    deploy:
      resources:
        limits:
          memory: 450M
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: banking-app-logs
        awslogs-stream: audit-service
        awslogs-create-group: "true"

  transaction-service:
    image: ${DOCKER_HUB_USER}/transaction-service:latest
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:9191
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - RDS_DB_HOST=${RDS_DB_HOST}
      - RDS_DB_PASSWORD=${RDS_DB_PASSWORD}
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=80.0
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: banking-app-logs
        awslogs-stream: transaction-service
        awslogs-create-group: "true"

networks:
  default:
    name: banking-network
