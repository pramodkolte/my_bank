spring:
  application:
    name: notification-service
  config:
    import: "optional:configserver:http://config-server:9191"
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest

server:
  port: 8084

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/

# Mock webhook URL to simulate sending emails/SMS
notification:
  webhook:
    url: http://webhook-mock:9999
