name: CD - Deploy Only

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Start EC2 Instance
        run: |
          aws ec2 start-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID }}
          aws ec2 wait instance-running --instance-ids ${{ secrets.EC2_INSTANCE_ID }}

      - name: Get Public IP & Security Group
        id: ec2-info
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID }} --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
          SG_ID=$(aws ec2 describe-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID }} --query 'Reservations[0].Instances[0].SecurityGroups[0].GroupId' --output text)
          RUNNER_IP=$(curl -s https://ifconfig.me)
          echo "ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "sg_id=$SG_ID" >> $GITHUB_OUTPUT
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT

      - name: Authorize Runner IP
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ steps.ec2-info.outputs.sg_id }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ec2-info.outputs.runner_ip }}/32 \
          || echo "Rule already exists or error occurred"

      - name: Copy Docker Compose
        uses: appleboy/scp-action@master
        with:
          host: ${{ steps.ec2-info.outputs.ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/banking-app/"

      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.ec2-info.outputs.ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_HUB_USER,DOCKER_HUB_TOKEN,DB_PASSWORD
          script: |
            mkdir -p ~/banking-app && cd ~/banking-app
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USER }}" --password-stdin
            export DOCKER_HUB_USER=${{ secrets.DOCKER_HUB_USER }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            docker compose pull
            docker compose up -d --remove-orphans

      - name: Revoke Runner IP
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ steps.ec2-info.outputs.sg_id }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ec2-info.outputs.runner_ip }}/32 \
          || echo "Authorization could not be revoked or never existed"
