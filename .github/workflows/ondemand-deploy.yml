name: On-Demand Banking App Deployment

on:
  push:
    branches: [main]
  workflow_dispatch: # Allows you to trigger this manually from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          [
            discovery-server,
            config-server,
            api-gateway,
            identity-service,
            account-service,
            notification-service,
            audit-service,
            transaction-service,
          ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build Service
        run: mvn clean package -pl ${{ matrix.service }} -am -DskipTests

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USER }}/${{ matrix.service }}:latest ./${{ matrix.service }}
          docker push ${{ secrets.DOCKER_HUB_USER }}/${{ matrix.service }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Start EC2 Instance
        run: |
          aws ec2 start-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID }}
          aws ec2 wait instance-running --instance-ids ${{ secrets.EC2_INSTANCE_ID }}

      - name: Get Public IP
        id: get-ip
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID }} --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)
          echo "ip=$PUBLIC_IP" >> $GITHUB_OUTPUT

      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.get-ip.outputs.ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_HUB_USER,DB_PASSWORD
          script: |
            cd ~/banking-app
            export DOCKER_HUB_USER=${{ secrets.DOCKER_HUB_USER }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            docker compose pull
            docker compose up -d --remove-orphans
