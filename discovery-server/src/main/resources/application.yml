server:
  port: 8761
  servlet:
    context-path: /api/v1/discovery

eureka:
  instance:
    hostname: discovery-server
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/api/v1/discovery/eureka/
    use-dns-for-fetching-remote-service-urls: false
  server:
    enable-self-preservation: false
    wait-time-in-ms-when-sync-empty: 0

spring:
  application:
    name: discovery-server
