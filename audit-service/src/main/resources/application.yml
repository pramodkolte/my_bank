spring:
  application:
    name: audit-service
  config:
    import: "optional:configserver:http://config-server:9191"
  kafka:
    bootstrap-servers: kafka-broker:9092
    consumer:
      group-id: audit-service-group
      auto-offset-reset: earliest

server:
  port: 8085

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
