spring:
  application:
    name: account-service
  config:
    import: "optional:configserver:http://config-server:9191/api/v1/config"
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


server:
  port: 8082

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/api/v1/discovery/eureka/

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10000
        failureRateThreshold: 50
    instances:
      identityService:
        baseConfig: default

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
