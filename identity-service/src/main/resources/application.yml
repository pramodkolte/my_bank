spring:
  application:
    name: identity-service
  config:
    import: "optional:configserver:http://config-server:9191"
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    user:
      name: user
      password: ${USER_PASSWORD:password}
  kafka:
    bootstrap-servers: kafka:9092

server:
  port: 8081

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
