# ── Disable config-server import so tests don't need a running config-server ──
spring.config.import=optional:configserver:

# ── DataSource: use H2 in-memory so JPA context loads without Postgres ──
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ── Disable Eureka registration ──
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# ── Disable AWS SQS listener startup (prevents real AWS calls during tests) ──
spring.cloud.aws.sqs.listener.auto-startup=false

# ── Use dummy AWS credentials (no real AWS calls should be made) ──
spring.cloud.aws.credentials.access-key=test
spring.cloud.aws.credentials.secret-key=test
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.sqs.endpoint=http://localhost:4566
spring.cloud.aws.sns.endpoint=http://localhost:4566

# ── Security: disable JWT validation in tests ──
spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:0
